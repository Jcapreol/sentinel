<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — AI SOC Analyst</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-title">
                <h1 class="logo">&#x26A1; SENTINEL</h1>
                <p class="tagline">Multi-agent security alert corroboration engine</p>
            </div>
            <div id="quota-badge" aria-live="polite" aria-label="VirusTotal quota"></div>
        </div>
    </header>

    <main class="main">
        <!-- Input panel -->
        <section class="input-panel" aria-label="Alert submission">
            <div class="form-group">
                <label for="alert-text">Security alert</label>
                <textarea
                    id="alert-text"
                    rows="5"
                    placeholder="Paste a security alert, log line, or IOC to analyze&#8230; (Ctrl+Enter to submit)"
                    aria-label="Security alert text"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="scenario-select">Or load a demo scenario</label>
                <select id="scenario-select" aria-label="Demo scenario selector">
                    <option value="">&#8212; Custom alert (live analysis) &#8212;</option>
                    <option value="tor-exit-node">Tor Exit Node (Confirmed)</option>
                    <option value="lsass-credential-dumping">LSASS Credential Dumping (Probable)</option>
                    <option value="urlhaus-malware-ip">URLhaus Malware IP (Confirmed)</option>
                    <option value="ssh-brute-force">SSH Brute Force (Investigating)</option>
                    <option value="google-benign">Google.com DNS Query (Benign)</option>
                </select>
            </div>

            <div class="form-actions">
                <button id="submit-btn" type="button">Analyze</button>
                <span class="submit-hint">Ctrl+Enter</span>
            </div>
        </section>

        <!-- Progress panel (visible during analysis) -->
        <section
            class="progress-panel"
            id="progress-panel"
            hidden
            aria-live="polite"
            aria-label="Analysis progress"
        >
            <div class="progress-inner">
                <span class="progress-spinner" aria-hidden="true">&#9676;</span>
                <span id="progress-label">Initializing analysis&#8230;</span>
            </div>
        </section>

        <!-- Verdict panel (populated and revealed by app.js) -->
        <section
            class="verdict-panel"
            id="verdict-panel"
            hidden
            aria-label="Analysis result"
        ></section>

        <!-- Session history (shown after first analysis; persists for tab lifetime) -->
        <section
            class="history-panel"
            id="history-panel"
            hidden
            aria-label="Session history"
        >
            <h2 class="history-heading">Session History</h2>
            <table class="history-table" id="history-table">
                <thead>
                    <tr>
                        <th scope="col">Timestamp</th>
                        <th scope="col">Indicator</th>
                        <th scope="col">Tier</th>
                        <th scope="col">Time</th>
                    </tr>
                </thead>
                <tbody id="history-tbody"></tbody>
            </table>
        </section>

        <!-- Evaluation methodology footnote (FR28) -->
        <footer class="eval-footnote" aria-label="Evaluation methodology">
            Evaluation: 100% precision and recall on a 10-sample labeled test set
            (5 benign, 5 malicious) &#8212;
            <code>eval/labeled_set.json</code> &#183; <code>eval/run_eval.py</code>
        </footer>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
